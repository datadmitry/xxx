{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
    <h1 class="mb-0">{{ test.title }}</h1>
    <div class="test-timer" id="testTimer">Время: <span id="timerValue">0:00</span></div>
</div>

<form method="POST" action="">
    {{ form.hidden_tag() if form }}
    {% for question in questions %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">Вопрос {{ loop.index }}</h5>
                <p class="card-text">{{ question.text }}</p>
                {% if question.img and question.img != 'NO' %}
                    <img src="{{ url_for('static', filename='img/' + question.img) }}"
                         style="width: 500px; max-width: 100%; height: auto; border-radius: 14px;" alt="">
                {% endif %}
                <div class="mb-3 mt-3">
                    <label for="question_{{ question.id }}" class="form-label">Ваш ответ:</label>
                    <input type="text" class="form-control" id="question_{{ question.id }}"
                           name="question_{{ question.id }}" required>
                </div>
            </div>
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Завершить тест</button>
</form>

<script>
    (function () {
        const start = Date.now();
        const valueEl = document.getElementById('timerValue');
        function tick() {
            const total = Math.floor((Date.now() - start) / 1000);
            const m = Math.floor(total / 60);
            const s = total % 60;
            valueEl.textContent = m + ':' + (s < 10 ? '0' + s : s);
        }
        tick();
        setInterval(tick, 1000);
    })();
</script>
{% endblock %}
